name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: brew install cmake ninja

      - name: Unit tests
        run: ./Scripts/run-unit-tests.sh

      - name: Smoke test (build + link check)
        run: ./Scripts/smoke-test.sh
