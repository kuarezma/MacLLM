name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      APP_SIGN_IDENTITY: ${{ secrets.APP_SIGN_IDENTITY }}
      PKG_SIGN_IDENTITY: ${{ secrets.PKG_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Checkout submodules
        run: |
          git submodule sync --recursive
          for attempt in 1 2 3; do
            if git submodule update --init --force --recursive; then
              exit 0
            fi
            echo "Submodule checkout failed; retrying ($attempt/3)..."
            git submodule deinit -f --all || true
            rm -rf .git/modules/Vendor/llama.cpp Vendor/llama.cpp
            sleep $((attempt * 5))
          done
          git submodule update --init --force --recursive

      - name: Install build tools
        run: brew install cmake ninja

      - name: Configure release signing
        id: signing
        run: |
          if [[ -n "$APP_SIGN_IDENTITY" && -n "$PKG_SIGN_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" && -n "$MACOS_CERTIFICATE_P12_BASE64" && -n "$MACOS_CERTIFICATE_PASSWORD" && -n "$MACOS_KEYCHAIN_PASSWORD" ]]; then
            echo "mode=developer" >> "$GITHUB_OUTPUT"
          else
            echo "mode=adhoc" >> "$GITHUB_OUTPUT"
            echo "Developer ID secrets eksik; ad-hoc imza ile devam ediliyor."
          fi

      - name: Install Developer ID certificate
        if: steps.signing.outputs.mode == 'developer'
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/macos-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        if: steps.signing.outputs.mode == 'developer'
        run: |
          xcrun notarytool store-credentials "macllm-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build release packages
        env:
          APP_SIGN_IDENTITY: ${{ steps.signing.outputs.mode == 'developer' && secrets.APP_SIGN_IDENTITY || '-' }}
          PKG_SIGN_IDENTITY: ${{ steps.signing.outputs.mode == 'developer' && secrets.PKG_SIGN_IDENTITY || '' }}
          NOTARYTOOL_PROFILE: ${{ steps.signing.outputs.mode == 'developer' && 'macllm-notary' || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SKIP_GITHUB=1 ./Scripts/create-release.sh "$VERSION"

      - name: Validate release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/MacLLM-${VERSION}-macOS-arm64.dmg"
          PKG="dist/MacLLM-${VERSION}-macOS-arm64.pkg"
          ZIP="dist/MacLLM-${VERSION}-macOS-arm64.zip"
          test -f "$DMG" && test -f "$PKG" && test -f "$ZIP" && test -f "dist/SHA256SUMS.txt"
          hdiutil verify "$DMG"
          MOUNTPOINT="$(mktemp -d)"
          hdiutil attach "$DMG" -nobrowse -readonly -mountpoint "$MOUNTPOINT"
          test -d "$MOUNTPOINT/MacLLM.app"
          codesign --verify --deep --strict --verbose=2 "$MOUNTPOINT/MacLLM.app"
          hdiutil detach "$MOUNTPOINT"
          rmdir "$MOUNTPOINT"
          (cd dist && shasum -a 256 -c SHA256SUMS.txt)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MacLLM-*-macOS-arm64.dmg
            dist/MacLLM-*-macOS-arm64.pkg
            dist/MacLLM-*-macOS-arm64.zip
            dist/SHA256SUMS.txt
          overwrite_files: true
          generate_release_notes: true
          body: |
            ## MacLLM — macOS Apple Silicon

            ### Install (no Terminal)

            | Method | File |
            |--------|------|
            | **Recommended** | Open DMG → double-click **MacLLM-*-macOS-arm64.pkg** inside |
            | Direct | Download **MacLLM-*-macOS-arm64.pkg** from Assets |
            | Manual | Drag **MacLLM.app** to Applications (first launch may need right-click → Open) |

            ### Homebrew

            ```bash
            brew install --cask https://raw.githubusercontent.com/kuarezma/MacLLM/main/packaging/homebrew/macllm.rb
            ```

            See [README](https://github.com/kuarezma/MacLLM/blob/main/README.md) for details.
